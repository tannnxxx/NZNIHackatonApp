<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-600 to-purple-700 min-h-screen flex items-center justify-center">

<div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl">

    <h1 class="text-3xl font-black text-center mb-6">Login</h1>

    {% if messages %}
        {% for message in messages %}
            <p class="text-red-500 text-sm text-center mb-4">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <!-- USER LOGIN -->
    <form method="POST" class="space-y-4">

        {% csrf_token %}

        <input type="text" name="username" placeholder="Username"
               class="w-full px-4 py-3 border rounded-xl">

        <input type="password" name="password" placeholder="Password"
               class="w-full px-4 py-3 border rounded-xl">

        <button type="submit"
            class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700">
            Login
        </button>

    </form>

    <!-- REGISTER -->
    <p class="text-center text-sm mt-6">
        No account?
        <a href="{% url 'register' %}" class="text-indigo-600 font-bold">
            Register here
        </a>
    </p>

    <!-- 🔥 ADMIN PANEL BUTTON -->
    <div class="mt-6 text-center">

        <a href="/admin/"
           class="inline-block w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-900 transition-all">

            🔐 Admin Panel Login

        </a>

        <p class="text-xs text-slate-400 mt-2">
            For administrators only
        </p>

    </div>

</div>

</body>
</html>
