<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Evaluation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

<div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-lg">

    <h1 class="text-3xl font-black text-slate-800 text-center mb-2">
        Evaluation Form
    </h1>

    <p class="text-center text-slate-500 mb-2 italic">
        Evaluating: <span class="font-bold text-indigo-600">{{ teacher.name }}</span>
    </p>

    <p class="text-center text-sm text-gray-500 mb-6">
        Role: <strong>{{ role }}</strong>
    </p>

    <form method="POST" action="{% url 'submit_eval' teacher.id %}" class="space-y-6">
        {% csrf_token %}

        <div id="questions_area" class="space-y-6"></div>

        <!-- SCALE GUIDE -->
        <p class="text-xs text-gray-400 text-center">
            1 = Poor • 2 = Fair • 3 = Good • 4 = Very Good • 5 = Excellent
        </p>

        <button type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-2xl font-black shadow-lg transition-all uppercase tracking-widest">
            Submit Evaluation
        </button>

        <a href="{% url 'student_dashboard' %}"
            class="block text-center mt-4 text-slate-400 text-sm hover:text-slate-600">
            Back to Dashboard
        </a>

    </form>

</div>

<script>
    const role = "{{ role }}";
    const area = document.getElementById('questions_area');

    function ratingInput(name, label) {
        return `
        <div>
            <label class="block font-bold text-slate-700 mb-2">${label}</label>
            <div class="flex justify-between">
                ${[1,2,3,4,5].map(i => `
                    <label class="flex flex-col items-center cursor-pointer">
                        <input type="radio" name="${name}" value="${i}" required>
                        <span class="text-sm mt-1">${i}</span>
                    </label>
                `).join('')}
            </div>
        </div>
        `;
    }

    // ================= STUDENT =================
    if (role === 'STUDENT') {
        area.innerHTML = `
        <div class="bg-indigo-50 p-4 rounded-2xl border-l-4 border-indigo-500">

            <p class="text-xs font-bold text-indigo-600 uppercase mb-3">
                Student Criteria
            </p>

            ${ratingInput('clarity', 'Teaching Clarity')}
            ${ratingInput('engagement', 'Engagement')}
            ${ratingInput('fairness', 'Fairness')}

        </div>
        `;
    }

    // ================= PROGRAM HEAD =================
    else if (role === 'PH') {
        area.innerHTML = `
        <div class="bg-emerald-50 p-4 rounded-2xl border-l-4 border-emerald-500">

            <p class="text-xs font-bold text-emerald-600 uppercase mb-3">
                Program Head Criteria
            </p>

            ${ratingInput('curriculum', 'Curriculum Mastery')}
            ${ratingInput('assessment', 'Assessment Quality')}
            ${ratingInput('mentoring', 'Mentoring')}

        </div>
        `;
    }

    // ================= DEAN =================
    else if (role === 'DEAN') {
        area.innerHTML = `
        <div class="bg-amber-50 p-4 rounded-2xl border-l-4 border-amber-500">

            <p class="text-xs font-bold text-amber-600 uppercase mb-3">
                Dean Criteria
            </p>

            ${ratingInput('attendance', 'Attendance')}
            ${ratingInput('commitment', 'Commitment')}
            ${ratingInput('quality', 'Professional Quality')}

        </div>
        `;
    }
</script>

</body>
</html>
