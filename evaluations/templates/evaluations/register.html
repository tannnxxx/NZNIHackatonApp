<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-600 to-indigo-700 min-h-screen flex items-center justify-center">

<div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl">

    <h1 class="text-3xl font-black text-center mb-2">Register</h1>

    {% if messages %}
        {% for message in messages %}
            <p class="text-red-500 text-sm text-center mb-4">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <!-- USERNAME -->
        <input type="text" name="username" placeholder="Username"
               class="w-full px-4 py-3 border rounded-xl">

        <!-- PASSWORD -->
        <input type="password" name="password" placeholder="Password"
               class="w-full px-4 py-3 border rounded-xl">

        <!-- DEPARTMENT (NEW 🔥) -->
        <select name="department" class="w-full px-4 py-3 border rounded-xl">
            <option value="">Select Department</option>
            <option value="BSIT">BSIT</option>
            <option value="EDUC">EDUC</option>
        </select>

        <!-- YEAR LEVEL -->
        <select name="year" class="w-full px-4 py-3 border rounded-xl">
            <option value="">Select Year Level</option>
            <option value="1ST">1st Year</option>
            <option value="2ND">2nd Year</option>
            <option value="3RD">3rd Year</option>
            <option value="4TH">4th Year</option>
        </select>

        <!-- SECTION -->
        <select name="section" class="w-full px-4 py-3 border rounded-xl">
            <option value="">Select Section</option>
            <option value="101">101</option>
            <option value="102">102</option>
            <option value="103">103</option>
            <option value="104">104</option>
            <option value="105">105</option>
            <option value="106">106</option>
            <option value="107">107</option>

            <option value="201">201</option>
            <option value="202">202</option>
            <option value="203">203</option>
            <option value="204">204</option>
            <option value="205">205</option>
            <option value="206">206</option>
            <option value="207">207</option>

            <option value="301">301</option>
            <option value="302">302</option>
            <option value="303">303</option>
            <option value="304">304</option>
            <option value="305">305</option>
            <option value="306">306</option>
            <option value="307">307</option>

            <option value="401">401</option>
            <option value="402">402</option>
            <option value="403">403</option>
            <option value="404">404</option>
            <option value="405">405</option>
            <option value="406">406</option>
            <option value="407">407</option>
        </select>

        <!-- SUBMIT -->
        <button class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold hover:bg-purple-700 transition-all">
            Register as Student
        </button>
    </form>

    <p class="text-center text-sm mt-6">
        Already have account?
        <a href="{% url 'login' %}" class="text-purple-600 font-bold">
            Login
        </a>
    </p>

</div>

</body>
</html>
