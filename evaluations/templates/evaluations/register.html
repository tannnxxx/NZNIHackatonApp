<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-600 to-indigo-700 min-h-screen flex items-center justify-center">

<div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl">

    <h1 class="text-3xl font-black text-center mb-2">Register</h1>

    {% if messages %}
        {% for message in messages %}
            <p class="text-red-500 text-sm text-center mb-4">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username"
               class="w-full px-4 py-3 border rounded-xl">

        <input type="password" name="password" placeholder="Password"
               class="w-full px-4 py-3 border rounded-xl">

        <button class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold">
            Register as Student
        </button>
    </form>

    <p class="text-center text-sm mt-6">
        Already have account?
        <a href="{% url 'login' %}" class="text-purple-600 font-bold">
            Login
        </a>
    </p>

</div>

</body>
</html>
